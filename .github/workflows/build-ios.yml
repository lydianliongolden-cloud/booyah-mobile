name: Build and Submit to App Store
on:
  workflow_dispatch: {}
jobs:
  build-ios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Install dependencies
        run: npm install
      - name: Write iOS credentials
        run: |
          echo "${{ secrets.IOS_DIST_CERT_P12 }}" | base64 --decode > distribution.p12
          echo "${{ secrets.IOS_PROVISIONING_PROFILE }}" | base64 --decode > profile.mobileprovision
          node -e "const fs=require('fs');fs.writeFileSync('credentials.json',JSON.stringify({ios:{provisioningProfilePath:'./profile.mobileprovision',distributionCertificate:{path:'./distribution.p12',password:process.env.CERT_PASS}}},null,2));console.log('credentials.json written');"
        env:
          CERT_PASS: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
      - name: Build iOS (EAS cloud)
        run: eas build --platform ios --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: Submit to App Store
        run: eas submit --platform ios --profile production --non-interactive --latest
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
