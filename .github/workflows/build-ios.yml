name: Build and Submit to App Store
on:
  workflow_dispatch: {}
jobs:
  build-ios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Install dependencies
        run: npm install
      - name: Write iOS credentials
        run: |
          node -e "const fs=require('fs');fs.writeFileSync('credentials.json',JSON.stringify({ios:{'bio.booyah.app':{distributionCertificate:{certP12:process.env.CERT_P12,certPassword:process.env.CERT_PASS},provisioningProfile:process.env.PROV_PROFILE}}},null,2));console.log('credentials.json written');"
        env:
          CERT_P12: ${{ secrets.IOS_DIST_CERT_P12 }}
          CERT_PASS: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          PROV_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
      - name: Build iOS (EAS cloud)
        run: eas build --platform ios --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: Submit to App Store
        run: eas submit --platform ios --profile production --non-interactive --latest
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
